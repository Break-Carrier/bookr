{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bookr{% endblock %}</title>
    {% tailwind_css %}
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <nav class="border-b border-zinc-800 px-6 py-4 sticky top-0 bg-zinc-950 z-10">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="{% url 'bookr_app:index' %}" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-amber-400 rounded flex items-center justify-center shrink-0">
                        <span class="text-black font-bold text-sm">B</span>
                    </div>
                    <span class="font-bold text-white">Bookr</span>
                </a>
                <div class="flex items-center gap-6 text-xs font-semibold tracking-widest">
                    <a href="{% url 'bookr_app:index' %}"
                       class="{% if request.resolver_match.url_name == 'index' %}text-amber-400 border-b-2 border-amber-400 pb-0.5{% else %}text-zinc-400 hover:text-white transition-colors{% endif %}">
                        LIVRES
                    </a>
                    <a href="{% url 'bookr_app:auteurs_list' %}"
                       class="{% if 'auteur' in request.resolver_match.url_name %}text-amber-400 border-b-2 border-amber-400 pb-0.5{% else %}text-zinc-400 hover:text-white transition-colors{% endif %}">
                        AUTEURS
                    </a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <a href="/admin/" class="text-zinc-400 hover:text-white text-xs font-semibold tracking-widest transition-colors">ADMINISTRATION</a>
                <a href="{% url 'backoffice:index' %}" class="text-xs font-semibold tracking-widest border border-zinc-600 text-zinc-300 px-3 py-1.5 rounded hover:border-amber-400 hover:text-amber-400 transition-colors">BACKOFFICE</a>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

</body>
</html>
