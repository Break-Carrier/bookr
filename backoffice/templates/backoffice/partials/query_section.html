<section class="mb-10">
    <div class="mb-4">
        <p class="text-amber-400 text-xs font-semibold tracking-widest">{{ num }}</p>
        <h2 class="text-2xl font-bold text-white mt-0.5">{{ titre }}</h2>
    </div>
    <div class="border-b border-zinc-800 mb-6"></div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {% for livre in livres %}
        <div class="bg-zinc-900 rounded-xl p-5 border border-zinc-800">
            <div class="flex items-start justify-between gap-4">
                <div class="flex-1 min-w-0">
                    <h3 class="font-semibold text-white truncate">{{ livre.nom }}</h3>
                    {% if livre.auteur %}<p class="text-amber-400/70 text-xs mt-0.5">{{ livre.auteur }}</p>{% endif %}
                    <div class="flex gap-2 mt-2 flex-wrap">
                        <span class="text-xs bg-zinc-800 text-zinc-300 px-2 py-0.5 rounded">{{ livre.livre_type.genre }}</span>
                        <span class="text-xs bg-zinc-800 text-zinc-300 px-2 py-0.5 rounded">{{ livre.livre_status.status }}</span>
                    </div>
                </div>
                <span class="text-amber-400 font-bold text-lg shrink-0">{{ livre.prix }}€</span>
            </div>
        </div>
        {% empty %}
        <p class="text-zinc-500 italic col-span-3">{{ empty_msg }}</p>
        {% endfor %}
    </div>
</section>
